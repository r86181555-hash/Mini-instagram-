<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK Login</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
</div>

<div class="container">

    <div class="logo">
        <div class="logo-box">
            <span>RHK</span>
        </div>
    </div>

    <div class="card">

        <h1 id="formTitle">Login</h1>

        <!-- Login Form -->
        <form id="loginForm">

            <input
                type="text"
                id="loginUsername"
                placeholder="Username"
                required
            >

            <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

            <p>
                Don't have an account?
                <a href="#" id="showSignup">
                    Create Account
                </a>
            </p>

        </form>

        <!-- Signup Form -->
        <form id="signupForm" style="display:none;">

            <input
                type="text"
                id="signupUsername"
                placeholder="Create Username"
                required
            >

            <input
                type="password"
                id="signupPassword"
                placeholder="Create Password"
                required
            >

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password"
                required
            >

            <button type="submit">
                Create Account
            </button>

            <p>
                Already have an account?
                <a href="#" id="showLogin">
                    Login
                </a>
            </p>

        </form>

    </div>

</div>

<!-- Firebase Files -->
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>

<!-- UI Script -->
<script src="script.js"></script>

</body>
</html>
